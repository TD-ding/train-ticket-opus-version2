name: CI
on:
  pull_request:
    branches: [main]
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - run: node node_modules/eslint/bin/eslint.js src/
      - run: node node_modules/.bin/jest --forceExit --detectOpenHandles
